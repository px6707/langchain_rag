services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16}
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ES_HOST_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  mailpit:
    # Use GHCR mirror — Docker Hub (axllent/mailpit) often times out in CN networks
    image: ghcr.io/axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - rag-network

  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim-bookworm}
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
      CHECKPOINTER_DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      ES_URL: http://elasticsearch:9200
      UPLOAD_DIR: /app/uploads
      OPENVIKING_PATH: /app/openviking_data
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - openviking_data:/app/openviking_data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  parse-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PYTHON_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim-bookworm}
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
      CHECKPOINTER_DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      ES_URL: http://elasticsearch:9200
      UPLOAD_DIR: /app/uploads
      OPENVIKING_PATH: /app/openviking_data
    volumes:
      - uploads:/app/uploads
      - openviking_data:/app/openviking_data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network

volumes:
  postgres_data:
  es_data:
  uploads:
  openviking_data:
